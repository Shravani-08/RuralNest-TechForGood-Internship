<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RuralNest – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">🌿</div>
        <h1>RuralNest</h1>
        <p>Mobile Maternal Healthcare Unit</p>
      </div>

      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="e.g. Priya Sharma" required autocomplete="name"/>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required maxlength="15" autocomplete="tel"/>
        </div>
        <button type="submit" class="btn btn-green btn-full">Continue →</button>
      </form>

      <p class="login-note">No registration required. Your data stays safe and private.</p>
    </div>
  </div>
</body>
</html>
